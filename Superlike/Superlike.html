<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Superlike ⭐</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #111;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; user-select: none; -webkit-user-select: none;
    }

    /* ── Tinder top bar ──────────────────────────────────────────── */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 56px; display: flex; align-items: center; justify-content: center;
      z-index: 50; background: linear-gradient(to bottom, rgba(17,17,17,0.95), transparent);
      padding-top: 8px;
    }
    .tinder-logo {
      display: flex; align-items: center; gap: 6px;
      font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em;
    }
    .tinder-logo svg { width: 28px; height: 28px; }
    .tinder-logo span { background: linear-gradient(135deg, #fd5068, #e91e63);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* ── Card stack ───────────────────────────────────────────────── */
    #stack {
      position: relative;
      width: min(92vw, 380px);
      height: min(72vh, 560px);
    }
    .shadow-card {
      position: absolute; inset: 0;
      border-radius: 16px;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .shadow-card-1 { transform: scale(0.96) translateY(10px); z-index: 1; }
    .shadow-card-2 { transform: scale(0.92) translateY(20px); z-index: 0; opacity: 0.6; }

    #card {
      position: absolute; inset: 0; z-index: 5;
      border-radius: 16px; overflow: hidden;
      background: #1a1a1a;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      cursor: grab; touch-action: none;
      will-change: transform;
      display: flex; flex-direction: column;
    }
    #card:active { cursor: grabbing; }

    /* Card photo area */
    .card-photo {
      flex: 1; position: relative;
      background-size: cover; background-position: center top;
      min-height: 0;
    }
    .card-photo::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
    }

    /* Card info overlay */
    .card-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 20px 22px 18px; z-index: 2;
    }
    .card-name {
      font-size: 1.7rem; font-weight: 700; color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      line-height: 1.2;
    }
    .card-age {
      font-weight: 300; font-size: 1.5rem; margin-left: 6px;
    }
    .card-sub {
      font-size: 0.85rem; color: rgba(255,255,255,0.7);
      margin-top: 4px;
    }
    .card-body {
      font-size: 0.88rem; color: rgba(255,255,255,0.85);
      margin-top: 10px; line-height: 1.65;
      max-height: 120px; overflow: hidden;
    }
    .card-year {
      display: inline-block; background: rgba(255,255,255,0.12);
      border-radius: 12px; padding: 2px 10px;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.8); margin-bottom: 6px;
    }

    /* Progress bar */
    .card-progress {
      position: absolute; top: 10px; left: 12px; right: 12px;
      display: flex; gap: 3px; z-index: 10;
    }
    .prog-seg {
      flex: 1; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.25);
      transition: background 0.3s;
    }
    .prog-seg.done { background: rgba(255,255,255,0.9); }
    .prog-seg.active { background: rgba(255,255,255,0.65); }

    /* Stamps */
    .stamp {
      position: absolute; top: 50px; z-index: 15;
      border: 4px solid; border-radius: 8px;
      padding: 6px 16px; font-size: 2rem; font-weight: 900;
      letter-spacing: 0.06em; opacity: 0; pointer-events: none;
      text-transform: uppercase;
    }
    .stamp-nope { left: 20px; color: #ff4458; border-color: #ff4458; transform: rotate(-15deg); }
    .stamp-like { right: 20px; color: #00d68f; border-color: #00d68f; transform: rotate(15deg); }

    /* ── Action buttons ───────────────────────────────────────────── */
    #actions {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; margin-top: 28px;
    }
    .action-btn {
      border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    .action-btn:active { transform: scale(0.85) !important; }
    .action-btn:hover { transform: scale(1.08); }
    .action-btn svg { display: block; }
    #btn-nope {
      width: 56px; height: 56px;
      background: #1a1a1a; border: 2px solid rgba(255,68,88,0.4);
    }
    #btn-nope svg { width: 24px; height: 24px; stroke: #ff4458; fill: none; stroke-width: 3; }
    #btn-star {
      width: 48px; height: 48px;
      background: #1a1a1a; border: 2px solid rgba(0,191,255,0.4);
    }
    #btn-star svg { width: 22px; height: 22px; fill: #00bfff; }
    #btn-like {
      width: 56px; height: 56px;
      background: #1a1a1a; border: 2px solid rgba(0,214,143,0.4);
    }
    #btn-like svg { width: 26px; height: 26px; fill: #00d68f; }
    .btn-gone { visibility: hidden !important; pointer-events: none !important; }

    /* ── Animations ───────────────────────────────────────────────── */
    @keyframes flyRight { to { transform: rotate(20deg) translateX(150vw); opacity: 0; } }
    @keyframes flyLeft  { to { transform: rotate(-20deg) translateX(-150vw); opacity: 0; } }
    @keyframes popIn    { 0% { transform: scale(0.85); opacity: 0; } 60% { transform: scale(1.02); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes shake {
      0%,100% { transform: rotate(0); }
      15% { transform: rotate(-4deg) translateX(-8px); }
      30% { transform: rotate(4deg) translateX(8px); }
      45% { transform: rotate(-3deg) translateX(-5px); }
      60% { transform: rotate(3deg) translateX(5px); }
      75% { transform: rotate(-1.5deg); }
    }
    #card.fly-right { animation: flyRight 0.4s ease forwards; }
    #card.fly-left  { animation: flyLeft  0.36s ease forwards; }
    #card.pop-in    { animation: popIn    0.32s ease; }
    #card.shake     { animation: shake    0.45s ease; }

    /* ── Toast ────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
      background: rgba(30,30,30,0.95); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px; padding: 10px 22px;
      font-size: 0.85rem; color: rgba(255,255,255,0.9); z-index: 90;
      opacity: 0; transition: opacity 0.25s; pointer-events: none;
      max-width: 300px; text-align: center;
    }

    /* ── Final screen ─────────────────────────────────────────────── */
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 200; display: none; }
    #final {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.96);
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 32px; gap: 16px;
    }
    #final.show { display: flex; }
    .f-icon  { font-size: 5rem; animation: popIn 0.5s ease; }
    .f-title { font-size: 1.8rem; font-weight: 700; color: #ffd700;
      text-shadow: 0 0 30px rgba(255,215,0,0.4); }
    .f-body  { font-size: 1rem; line-height: 1.75; color: rgba(255,255,255,0.88); max-width: 300px; }
    .f-sub   { font-size: 0.78rem; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; margin-top: 4px; }
    #btn-replay {
      margin-top: 10px; padding: 14px 32px;
      background: linear-gradient(135deg, #fd5068, #e91e63);
      color: #fff; border: none; border-radius: 30px;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; box-shadow: 0 8px 25px rgba(253,80,104,0.4);
      transition: transform 0.13s;
    }
    #btn-replay:hover { transform: scale(1.05); }
  </style>
</head>

    document.getElementById('stamp-like').style.opacity = '0';

    // Progress segments (Instagram-story style)
    var prog = document.getElementById('progress');
    prog.innerHTML = '';
    for (var i = 0; i < CARDS.length; i++) {
      var seg = document.createElement('div');
      seg.className = 'prog-seg' + (i < idx ? ' done' : i === idx ? ' active' : '');
      prog.appendChild(seg);
    }

    // Hide nope/star on final card
    var bN = document.getElementById('btn-nope');
    var bS = document.getElementById('btn-star');
    if (c.final) { bN.classList.add('btn-gone'); bS.classList.add('btn-gone'); }
    else { bN.classList.remove('btn-gone'); bS.classList.remove('btn-gone'); }

    cardEl.classList.remove('pop-in');
    void cardEl.offsetWidth;
    cardEl.classList.add('pop-in');
  }

  /* ── Toast ──────────────────────────────────────────────────── */
  var toastTimer = null;
  function showToast(msg) {
    clearTimeout(toastTimer);
    var el = document.getElementById('toast');
    el.textContent = msg; el.style.opacity = '1';
    toastTimer = setTimeout(function () { el.style.opacity = '0'; }, 2400);
  }

  /* ── Advance card ───────────────────────────────────────────── */
  function advance(dir) {
    if (animating) return;
    animating = true;
    document.getElementById(dir === 'right' ? 'stamp-like' : 'stamp-nope').style.opacity = '1';
    var cls = dir === 'right' ? 'fly-right' : 'fly-left';
    var flyDur = dir === 'right' ? 500 : 460;
    cardEl.classList.add(cls);
    var done = false;
    function finish() {
      if (done) return; done = true;
      cardEl.removeEventListener('animationend', onEnd);
      cardEl.classList.remove(cls);
      cardEl.style.transform = '';
      idx++;
      animating = false;
      if (idx >= CARDS.length) { celebrate(); }
      else { render(); if (CARDS[idx].final) setTimeout(celebrate, 900); }
    }
    var flyName = dir === 'right' ? 'flyRight' : 'flyLeft';
    function onEnd(e) { if (e.animationName === flyName) finish(); }
    cardEl.addEventListener('animationend', onEnd);
    setTimeout(finish, flyDur);
  }

  /* ── Nope (shake) ───────────────────────────────────────────── */
  function onNope() {
    if (animating) return;
    document.getElementById('stamp-nope').style.opacity = '1';
    cardEl.classList.remove('shake'); void cardEl.offsetWidth;
    cardEl.classList.add('shake');
    var done = false;
    function finish() {
      if (done) return; done = true;
      cardEl.removeEventListener('animationend', onEnd);
      cardEl.classList.remove('shake');
      document.getElementById('stamp-nope').style.opacity = '0';
    }
    function onEnd(e) { if (e.animationName === 'shake') finish(); }
    cardEl.addEventListener('animationend', onEnd);
    setTimeout(finish, 600);
    showToast(NOPE_MSGS[nopeCount++ % NOPE_MSGS.length]);
  }

  function onLike() {
    if (!animating) {
      if (CARDS[idx].final) celebrate();
      else advance('right');
    }
  }
  function onStar() {
    if (!animating) { showToast('⭐ Superlike!'); advance('right'); }
  }

  /* ── Drag / swipe ───────────────────────────────────────────── */
  function dragMove(x) {
    if (!dragging || animating) return;
    dragDx = x - dragStartX;
    if (Math.abs(dragDx) < 5) return;
    var rot = dragDx * 0.06;
    cardEl.style.transition = 'none';
    cardEl.style.transform = 'translateX(' + (dragDx * 0.6) + 'px) rotate(' + rot + 'deg)';
    document.getElementById('stamp-nope').style.opacity = dragDx < -30 ? Math.min(1, (-dragDx - 30) / 60) : '0';
    document.getElementById('stamp-like').style.opacity = dragDx > 30 ? Math.min(1, (dragDx - 30) / 60) : '0';
  }
  function dragEnd() {
    if (!dragging) return;
    dragging = false;
    cardEl.style.transition = 'transform 0.3s ease';
    cardEl.style.transform = '';
    document.getElementById('stamp-nope').style.opacity = '0';
    document.getElementById('stamp-like').style.opacity = '0';
    if (dragDx > 90) advance('right');
    else if (dragDx < -90) onNope();
  }

  // Mouse events
  cardEl.addEventListener('mousedown', function (e) {
    if (!animating) { dragStartX = e.clientX; dragging = true; dragDx = 0; }
  });
  window.addEventListener('mousemove', function (e) { dragMove(e.clientX); });
  window.addEventListener('mouseup', dragEnd);

  // Touch events
  cardEl.addEventListener('touchstart', function (e) {
    if (!animating) { dragStartX = e.touches[0].clientX; dragging = true; dragDx = 0; }
  }, { passive: true });
  window.addEventListener('touchmove', function (e) { dragMove(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('touchend', dragEnd);

  // Keyboard
  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowRight' || e.key === 'Enter') onLike();
    if (e.key === 'ArrowLeft') onNope();
    if (e.key === ' ') onStar();
  });

  /* ── Button listeners ───────────────────────────────────────── */
  document.getElementById('btn-nope').addEventListener('click', onNope);
  document.getElementById('btn-like').addEventListener('click', onLike);
  document.getElementById('btn-star').addEventListener('click', onStar);
  document.getElementById('btn-replay').addEventListener('click', function () {
    document.getElementById('final').classList.remove('show');
    idx = 0; nopeCount = 0; animating = false; render();
  });

  /* ── Celebration ────────────────────────────────────────────── */
  function celebrate() {
    var cv = document.getElementById('confetti');
    cv.style.display = 'block';
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    var ctx = cv.getContext('2d');
    var C = ['#ff4458', '#ffd700', '#00d68f', '#00bfff', '#e91e63', '#fb923c', '#a78bfa'];
    var S = ['♥', '⭐', '✨', '💕', '🌟', '◆', '•'];
    var pcs = [];
    for (var i = 0; i < 130; i++) pcs.push({
      x: Math.random() * cv.width, y: -20 - Math.random() * 300,
      vx: (Math.random() - 0.5) * 4, vy: 1.8 + Math.random() * 3.5,
      shape: S[~~(Math.random() * S.length)], color: C[~~(Math.random() * C.length)],
      size: 13 + Math.random() * 14, rot: Math.random() * 360, rs: (Math.random() - 0.5) * 7
    });
    var fr = 0;
    (function draw() {
      ctx.clearRect(0, 0, cv.width, cv.height);
      pcs.forEach(function (p) {
        p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.rot += p.rs;
        if (p.y > cv.height + 20) { p.y = -20; p.x = Math.random() * cv.width; }
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color; ctx.font = p.size + 'px serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(p.shape, 0, 0); ctx.restore();
      });
      if (++fr < 340) requestAnimationFrame(draw); else cv.style.display = 'none';
    })();
    setTimeout(function () { document.getElementById('final').classList.add('show'); }, 1200);
  }

  /* ── Start ──────────────────────────────────────────────────── */
  render();
}());
</script>
</body>
</html>
