name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe with PyInstaller
        run: >
          python -m PyInstaller
          --onefile
          --icon=DeepIntoTheForest/app.ico
          --dist=DeepIntoTheForest/dist/
          DeepIntoTheForest/DeepIntoTheForest.py
          --name DeepIntoTheForest

      - name: Read version from README
        id: ver
        shell: bash
        run: |
          VER=$(grep -oP '(?<=VERSION )\d+\.\d+\.\d+' README.md | head -1 || echo "1.1.1")
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.version }}-build.${{ github.run_number }}"
          name: "v${{ steps.ver.outputs.version }} (build ${{ github.run_number }})"
          body: |
            Auto-release from master branch push.
            Commit: ${{ github.sha }}
          files: DeepIntoTheForest/dist/DeepIntoTheForest.exe
          generate_release_notes: true
